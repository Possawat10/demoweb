<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ แก้ไขสินค้า - Coffee Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #764ba2;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.05em;
        }
        
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .current-image {
            margin: 15px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }
        
        .current-image img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        
        .no-image {
            color: #999;
            font-style: italic;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        button,
        .btn-cancel {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button {
            background: #27ae60;
            color: white;
        }
        
        button:hover {
            background: #229954;
        }
        
        .btn-cancel {
            background: #95a5a6;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-cancel:hover {
            background: #7f8c8d;
        }
        
        .info {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            color: #555;
            border-left: 4px solid #667eea;
        }
        
        @media (max-width: 600px) {
            .form-container {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1>☕ แก้ไขสินค้า</h1>
            
            <div class="info">
                <strong>💡 หมายเหตุ:</strong> แก้ไขข้อมูลสินค้าและบันทึก
            </div>
            
            <form method="POST">
                <div class="form-group">
                    <label for="name">ชื่อสินค้า *</label>
                    <input type="text" id="name" name="name" value="{{ coffee['name'] }}" required>
                </div>
                
                <div class="form-group">
                    <label for="price">ราคา (บาท) *</label>
                    <input type="number" id="price" name="price" value="{{ coffee['price'] }}" required step="0.01" min="0">
                </div>
                
                <div class="form-group">
                    <label for="image">ลิงค์รูปภาพ (URL)</label>
                    <input type="text" id="image" name="image" value="{{ coffee['image'] or '' }}">
                    {% if coffee['image'] %}
                        <div class="current-image">
                            <img src="{{ coffee['image'] }}" alt="{{ coffee['name'] }}">
                        </div>
                    {% else %}
                        <div class="current-image no-image">ไม่มีรูปภาพ</div>
                    {% endif %}
                </div>
                
                <div class="form-group">
                    <label for="stock">จำนวนสต๊อก *</label>
                    <input type="number" id="stock" name="stock" value="{{ coffee['stock'] }}" required min="0">
                </div>
                
                <div class="form-group">
                    <label for="category">หมวดหมู่ *</label>
                    <select id="category" name="category_id" required>
                        {% for category in categories %}
                            <option value="{{ category['id'] }}" {% if category['id'] == coffee['category_id'] %}selected{% endif %}>
                                {{ category['name'] }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="submit">✓ บันทึกการเปลี่ยนแปลง</button>
                    <a href="{{ url_for('index') }}" class="btn-cancel">✕ ยกเลิก</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
